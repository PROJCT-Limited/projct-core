<body>
    <div class="header"> 
        <div class="logo_PROJCT"><img src = "SVG/logo-white.svg" alt="logo" class = "logo-svg"/></div>
        <div class="nav-right">
            <div class="button-header button_header1"> 
              <img src="SVG/Asset 1.svg" alt="Arrow" class="nav-svg"/>
              <div class="nav-arrow"><p><a href="nodes.html">Multidisciplinary network, building better experiences, ventures and culture.</a></p></div>
            
            </div>
            </div>
            <div class="button-header button-header2">
                <div class="nav-arrow"></div><div class="nav-text"></div>
            </div>
      </div>
  <div class="cursor"></div>
  <div class="mode-switcher">
    <button id="mouseControl" class="switch active" type="button">Mouse Control</button>
    <button id="handControl"  class="switch"          type="button">Hand Control</button>
  </div>
  <script>
    // H = Hand on/off, M = Mouse on/off, K = kill overlay (for testing)
    window.addEventListener('keydown', e => {
      const k = e.key.toLowerCase();
      if (k === 'h') window.enableHandKnobControl?.();
      if (k === 'm') window.disableHandKnobControl?.();
      if (k === 'k') {
        const ov = document.getElementById('hand-overlay');
        if (ov) ov.style.display = 'none';
      }
    });
  
    // Ensure the mode switcher isn’t trapped in a stacking context
    document.addEventListener('DOMContentLoaded', () => {
      const ms = document.querySelector('.mode-switcher');
      if (ms && ms.parentElement !== document.body) {
        document.body.appendChild(ms); // lift it to the top level
      }
    });
  </script>
  
</body>
